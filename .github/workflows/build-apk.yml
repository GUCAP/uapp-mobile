name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyse (no fatal errors)
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: UAPP-Mobile-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: apk-${{ github.run_number }}
          name: UAPP Mobile APK (Build ${{ github.run_number }})
          body: |
            ## UAPP Communication Hub — Android APK

            **Download:** Click `app-release.apk` below to install on your Android phone.

            **Install steps:**
            1. Download the APK on your Android phone
            2. Go to Settings → Security → Enable "Install unknown apps"
            3. Open the downloaded APK and install

            Built from commit: ${{ github.sha }}
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
